# FIGSIZES
# matplotlib default figsize is (6.4,4.8) inches
figsize_single:
  validator: figsize
  source: literal
  keep: True
  value: (3.6,2.7) 
figsize_single_wide:
  validator: figsize
  source: field
  keep: True
  value: figsize_single
figsize_single_square:
  validator: figsize
  source: literal
  keep: True
  value: (3.6,3.6) 
figsize_single_square_tiny:
  validator: figsize
  source: literal
  keep: True
  value: (0.8,0.8) 
figsize_multiple:
  validator: figsize
  keep: True
  source: literal
  value: "lambda n: (3.6, 2.6 * n)"

# FONT SIZES
# Fontsizes are given in pt. 	1 in = 72 pts
# Default font size for labels and titles is 10
label_fontsize:
  validator: fontsize
  keep: True
  source: literal
  value: 10
title_fontsize:
  validator: fontsize
  keep: True
  source: literal
  value: 12
annotate_fontsize:
  validator: fontsize
  keep: True
  source: literal
  value: 8
legend_fontsize:
  validator: fontsize
  keep: True
  source: literal
  value: 7
tick_label_fontsize:
  validator: fontsize
  keep: True
  source: literal
  value: 6
axis_label_fontsize:
  validator: fontsize
  keep: True
  source: literal
  value: 8
  
# LINE WIDTHS
# Default linewidth for plots is 1.5
linewidth_extrathin:
  validator: linewidth
  keep: True
  source: literal
  value: 0.3
linewidth_thin:
  validator: linewidth
  keep: True
  source: literal
  value: 0.5
linewidth_medium:
  validator: linewidth
  keep: True
  source: literal
  value: 1
linewidth_thick:
  validator: linewidth
  keep: True
  source: literal
  value: 1.5
linewidth_extrathick:
  validator: linewidth
  keep: True
  source: literal
  value: 2
spine_linewidth:
  validator: linewidth
  keep: True
  source: literal
  value: 0.5
