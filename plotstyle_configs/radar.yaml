configs:
  - save_folder: Figures\IEEE-TIM-2026
    language: en
  - save_folder: Figures\Dissertação
    language: pt
yaml: 
  validator: yaml
  source: literal
  value: ["layout_two-column.yaml","template_IEEE2025.yaml","base_IEEE-TIM-2026.yaml"]
save:
  validator: bool
  source: literal
  value: True
title:
  validator: str
  localizable: True
  source: literal
  value:
    en: 'KPI comparison radar chart'
    pt: 'Gráfico radar de comparação de KPIs'
title_padding:
  validator: float
  source: literal
  value: 20
filename:
  validator: filename
  source: literal
  value: 'KPI_comparison_radar_plot'
filename_prefix:
  validator: filename
  source: literal
  value: 'KPI_radar_plot'

# SCRIPT CONTROL PARAMETERS
queries:
  - "Output"
  - "MEM max"
  # - "MEM avg"
  # - "CPU total: max"
  - "CPU total: avg"
  - "Elapsed"
bases_for_logscale_transformation:
  Output: 2
  MEM max: 2
  # MEM avg: 2
  # 'CPU total: max': 2
  'CPU total: avg': 5
  Elapsed: 10
normalizing_values:
  Output: 2
  MEM max: 4
  # MEM avg: 1
  # 'CPU total: max': 50
  'CPU total: avg': 20
  Elapsed: 1000
# query_axis_label_mapping:
#   Output: 'Accuracy'
#   MEM max: 'MEM max'
#   # MEM avg: 'MEM avg'
#   # 'CPU total: max': 'CPU max'
#   'CPU total: avg': 'CPU avg'
#   Elapsed: 'Script time'
query_axis_label_mapping:
  Output: 'A'
  MEM max: 'B'
  # MEM avg: 'B'
  # 'CPU total: max': 'C'
  'CPU total: avg': 'C'
  Elapsed: 'D [min]'

name_legend_mapping:
  Comparison_LSTM: 'LSTM'
  Comparison_RNN: 'RNN'
  DDSEspeleo: 'Proposed'
axis_scale_margin_gamma:
  validator: float
  source: literal
  value: 0.05
min_tick_label_radius:  # Minimum distance from center where a tick must land for it's label to be drawn
  validator: float
  source: literal
  value: 0.15



# PLOT STYLE PARAMETERS
figsize:
  validator: figsize
  source: field
  value: figsize_single_square_tiny
radial_grid_levels: # How many concentric circles to draw
  validator: int
  source: literal
  value: 3
axis_label_direction: # What direction to draw axis labels
  validator: str
  source: literal
  # value: 'upright'
  value: 'radial'
upside_down_text_threshold_angle_from_horizontal:
  validator: float
  source: literal
  value: 75 # Degrees
main_axis:            # Pick one axis to set a direction
  validator: str
  source: literal
  value: 'Output' # Must be one of queries or None
main_axis_direction:  # Angle at which to draw main_axis
  validator: float
  source: literal
  value: 90 # Degrees, canonical coord system
axis_sequence:
  validator: str
  source: literal
  value: cw   # cw or ccw
axis_label_offset:  # radial magnitude to apply to xytext, textcoords='offset_points', when drawing axis labels
  validator: float
  source: literal
  value: 7  # Points
region_alpha:
  validator: float
  source: field
  value: region_alpha_low
line_color:
  validator: color
  source: literal
  value: 'C0'
linewidth:
  validator: linewidth
  source: field
  value: linewidth_thick
grid_color:
  validator: color
  source: literal
  value: [0.8, 0.8, 0.8, 0.3]
label_color:
  validator: color
  source: literal
  keep: True
  value: [0.4,0.4,0.4]
grid_options:
  validator: gridoptions
  source: literal
  value:
    - color:
        validator: color
        source: field
        value: grid_color
      linewidth:
        validator: linewidth
        source: field
        value:  linewidth_extrathin

tick_label_fontsize: 5
axis_label_fontsize: 7