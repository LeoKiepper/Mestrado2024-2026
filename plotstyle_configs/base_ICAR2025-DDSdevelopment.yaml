template:
  validation: yaml
  source: constant
  value: "template_IEEE2025.yaml" 
save_with_title:
  validation: bool
  source: constant
  value: False
save_folder:
  validation: pathstr
  source: constant
  value: "Figures/ICAR2025_DDSdevelopment"

# LABEL SUFFIXES
time_unit_annotation:
  validation: str
  source: constant
  value: r' $[s]$'
temperature_unit_annotation:
  validation: str
  source: constant
  value: r' $[°C]$'
percent_unit_annotation:
  validation: str
  source: constant
  value: r' $[\%]$'

# LABELS
xlabel_timeseries:
  validation: str
  localizable: True
  source: constant
  value:
    en: 'Time'
    pt: 'Tempo'
  suffix:
    validation: str
    source: filed
    value: "time_unit_annotation"
ylabel_temperature:
  validation: str
  localizable: True
  source: constant
  value:
    en: 'Temperature'
    pt: 'Temperatura'
  suffix:
    validation: str
    source: field
    value: "temperature_unit_annotation"
ylabel_temperaturediff:
  validation: str
  localizable: True
  source: constant
  value:
    en: 'Temperature difference'
    pt: 'Diferença de temperatura'
  suffix:
    validation: str
    source: field
    value: "temperature_unit_annotation"
ylabel_cpuload:
  validation: str
  localizable: True
  source: constant
  value:
    en: 'CPU load'
    pt: 'Utilização da CPU'
  suffix:
    validation: str
    source: field
    value: "percent_unit_annotation"

# GRID OPTIONS
grid_options:
  validation: gridoptions
  source: constant
  value:
    - which: 
        validation: str
        source: constant
        value: major
      color:
        validation: color
        source: constant
        value: "#e0e0e0"
      linewidth:
        validation: linewidth
        source: constant
        value:  0.6
    - which: 
        validation: str
        source: constant
        value: minor
      color:
        validation: color
        source: constant
        value: "#f0f0f0"
      linewidth:
        validation: linewidth
        source: constant
        value:  0.3
      linestyle:
        validation: str
        source: constant
        value: "--"

# SHARED PLOT OPTIONS
prediction_plot_options:
  validation: plotoptions
  source: constant
  value:
    label:
      validation: str
      localizable: True
      source: constant
      value:
        en: 'Prediction'
        pt: 'Predição'
    linewidth:
      validation: linewidth
      source: constant
      value: linewidth_thick
    color:
      validation: color
      source: constant
      value: C1
reference_plot_options:
  validation: plotoptions
  source: constant
  value:
    label:
      validation: str
      localizable: True
      source: constant
      value:
        en: 'Reference'
        pt: 'Referência'
    linewidth:
      validation: linewidth
      source: constant
      value: linewidth_thin
    color:
      validation: color
      source: constant
      value: C0
plotarea_facecolor:
  validation: color
  source: constant
  value: '#fbfbfb'