template:
  validator: yaml
  source: literal
  value: "template_IEEE2025.yaml" 
save_with_title:
  validator: bool
  source: literal
  value: False
save_folder:
  validator: pathstr
  source: literal
  value: "Figures/ICAR2025_DDSdevelopment"

# LABEL SUFFIXES
time_unit_annotation:
  validator: str
  source: literal
  value: r' $[s]$'
temperature_unit_annotation:
  validator: str
  source: literal
  value: r' $[°C]$'
percent_unit_annotation:
  validator: str
  source: literal
  value: r' $[\%]$'

# LABELS
xlabel_timeseries:
  validator: str
  localizable: True
  source: literal
  value:
    en: 'Time'
    pt: 'Tempo'
  suffix:
    validator: str
    source: filed
    value: "time_unit_annotation"
ylabel_temperature:
  validator: str
  localizable: True
  source: literal
  value:
    en: 'Temperature'
    pt: 'Temperatura'
  suffix:
    validator: str
    source: field
    value: "temperature_unit_annotation"
ylabel_temperaturediff:
  validator: str
  localizable: True
  source: literal
  value:
    en: 'Temperature difference'
    pt: 'Diferença de temperatura'
  suffix:
    validator: str
    source: field
    value: "temperature_unit_annotation"
ylabel_cpuload:
  validator: str
  localizable: True
  source: literal
  value:
    en: 'CPU load'
    pt: 'Utilização da CPU'
  suffix:
    validator: str
    source: field
    value: "percent_unit_annotation"

# GRID OPTIONS
grid_options:
  validator: gridoptions
  source: literal
  value:
    - which: 
        validator: str
        source: literal
        value: major
      color:
        validator: color
        source: literal
        value: "#e0e0e0"
      linewidth:
        validator: linewidth
        source: literal
        value:  0.6
    - which: 
        validator: str
        source: literal
        value: minor
      color:
        validator: color
        source: literal
        value: "#f0f0f0"
      linewidth:
        validator: linewidth
        source: literal
        value:  0.3
      linestyle:
        validator: str
        source: literal
        value: "--"

# SHARED PLOT OPTIONS
prediction_plot_options:
  validator: plotoptions
  source: literal
  value:
    label:
      validator: str
      localizable: True
      source: literal
      value:
        en: 'Prediction'
        pt: 'Predição'
    linewidth:
      validator: linewidth
      source: literal
      value: linewidth_thick
    color:
      validator: color
      source: literal
      value: C1
reference_plot_options:
  validator: plotoptions
  source: literal
  value:
    label:
      validator: str
      localizable: True
      source: literal
      value:
        en: 'Reference'
        pt: 'Referência'
    linewidth:
      validator: linewidth
      source: literal
      value: linewidth_thin
    color:
      validator: color
      source: literal
      value: C0
plotarea_facecolor:
  validator: color
  source: literal
  value: '#fbfbfb'