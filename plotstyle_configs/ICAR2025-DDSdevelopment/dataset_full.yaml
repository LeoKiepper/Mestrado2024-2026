base:
  validator: yaml
  source: literal
  value: "base_ICAR2025-DDSdevelopment.yaml"
save:
  validator: bool
  source: literal
  value: True

figsize:
  validator: figsize
  source: field
  value: "figsize_multiple"
title:
  validator: str
  localizable: True
  source: literal
  value:
    en: 'Full length dataset'
    pt: 'Dataset em duração cheia'
xlabel:
  validator: label
  source: field
  value: "xlabel_timeseries"
ylabel:
  validator: str
  source: field
  value: 
    - "ylabel_temperature"
    - "ylabel_cpuload"
filename:
  validator: filename
  source: literal
  value: 'Dataset_full'
