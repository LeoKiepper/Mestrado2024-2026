base:
  validation: yaml
  source: constant
  value: "base_ICAR2025-DDSdevelopment.yaml"
save:
  validation: bool
  source: constant
  value: True

figsize:
  validation: figsize
  source: field
  value: "figsize_multiple"
title:
  validation: str
  localizable: True
  source: constant
  value:
    en: 'Full length dataset'
    pt: 'Dataset em duração cheia'
xlabel:
  validation: label
  source: field
  value: "xlabel_timeseries"
ylabel:
  validation: str
  source: field
  value: 
    - "ylabel_temperature"
    - "ylabel_cpuload"
filename:
  validation: filename
  source: constant
  value: 'Dataset_full'
