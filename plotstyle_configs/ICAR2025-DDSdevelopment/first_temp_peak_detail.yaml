base:
  validator: yaml
  source: literal
  value: "base_ICAR2025-DDSdevelopment.yaml"
save:
  validator: bool
  source: literal
  value: True

figsize:
  validator: figsize
  source: field
  value: "figsize_multiple"
title:
  validator: str
  localizable: True
  source: literal
  value:
    en: 'Detailed view for detected high CPU segment'
    pt: 'Detalhe do segmento de alta utilização de CPU'
xlabel:
  validator: str
  source: field
  value: "xlabel_timeseries"
ylabel:
  validator: str
  source: field
  value: 
    - "ylabel_temperature"
    - "ylabel_cpuload"
filename:
  validator: filename
  source: literal
  value: 'First_temp_peak_detail'
