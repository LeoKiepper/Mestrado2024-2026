base:
  validation: yaml
  source: constant
  value: "base_ICAR2025-DDSdevelopment.yaml"
save:
  validation: bool
  source: constant
  value: True

title:
  validation: str
  localizable: True
  source: constant
  value:
    en: 'Composite prediction'
    pt: 'Predição composta'
xlabel:
  validation: str
  source: field
  value: "xlabel_timeseries"
ylabel:
  validation: str
  source: field
  value: "ylabel_temperature"
filename:
  validation: filename
  source: constant
  value: 'Composite_prediction'
