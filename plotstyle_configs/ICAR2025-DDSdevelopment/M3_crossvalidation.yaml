base:
  validation: yaml
  source: constant
  value: "base_ICAR2025-DDSdevelopment.yaml"
save:
  validation: bool
  source: constant
  value: False

figsize:
  validation: figsize
  source: field
  value: "figsize_multiple"
title:
  validation: str
  localizable: True
  source: constant
  value:
    en: 'M3 cross-validation'
    pt: 'Validação cruzada M3'
xlabel:
  validation: str
  source: field
  value: "xlabel_timeseries"
ylabel:
  validation: str
  source: field
  value: "ylabel_temperaturediff"
  shared: True
filename:
  validation: filename
  source: constant
  value: 'M3_crossvalidation'
