configs:
  - save_folder: Figures\IEEE-TIM-2026
    language: en
    yaml:
      validation: yaml
      source: literal
      value: ["layout_two-column.yaml", "template_IEEE2025.yaml", "base_IEEE-TIM-2026.yaml"]
  - save_folder: Figures\Dissertação
    language: pt
    yaml:
      validation: yaml
      source: literal
      value: ["layout_one-column.yaml", "template_IEEE2025.yaml", "base_IEEE-TIM-2026.yaml"]

# FILENAMES AND TITLES
dataset_full_filename:
  validation: filename
  source: literal
  value: Dataset_full
dataset_full_title:
  validation: str
  source: literal
  localizable: True
  value:
    en: Full length dataset
    pt: Dataset, duração cheia
dataset_full_savefig:
  validation: bool
  source: literal
  value: True

first_temp_peak_detail_filename:
  validation: filename
  source: literal
  value: First_temp_peak_detail
first_temp_peak_detail_title:
  validation: str
  source: literal
  localizable: True
  value:
    en: Detailed view for detected high CPU segment
    pt: Detalhe do segmento de alta utilização de CPU
first_temp_peak_detail_savefig:
  validation: bool
  source: literal
  value: True

dataset_clipped_filename:
