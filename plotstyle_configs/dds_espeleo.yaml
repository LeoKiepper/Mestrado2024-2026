# LABELS
xlabel_training_score_history:
  validation: str
  localizable: True
  source: literal
  value:
    en: 'Iteration'
    pt: 'Iteração'
# ylabel_training_score_history is fetched in the plotting script

# OTHER OPTIONS
overheating_segment_accent_color:
  validation: color
  source: literal
  value: "#ff7676ff"
overheating_segment_accent_alpha:
  validation: float
  source: literal
  value: 0.4

segment_plot_key_label_map:
  validation: dict
  source: literal
  value:
    segment:
      validation: str
      source: literal
      localizable: True
      value:
        en: 'segment: '
        pt: 'segmento: '
    state:
      validation: str
      source: literal
      localizable: True
      value:
        en: 'state: '
        pt: 'estado: '
    avg_CPU_load:
      validation: str
      source: literal
      localizable: True
      value:
        en: 'avg. CPU load = '
        pt: 'carga da CPU média = '
    time_window:
      validation: str
      source: literal
      localizable: True
      value:
        en: 'time window: '
        pt: 'faixa de tempo: '
    dispatch:
      validation: str
      source: literal
      localizable: True
      value:
        en: 'models dispatched: '
        pt: 'modelos usados: '